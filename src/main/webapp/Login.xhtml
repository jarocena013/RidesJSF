<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Login</title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>
<h:body>
    <h:form id="loginForm">
        <h3>Saioa Hasi / Login</h3>
        <h:messages style="color:red;"/>

        <h:panelGrid columns="2">
            <h:outputLabel value="Email:" />
            <h:inputText value="#{loginBean.email}" required="true" />

            <h:outputLabel value="Pasahitza:" />
            <h:inputSecret value="#{loginBean.password}" required="true" />
        </h:panelGrid>

        <br/>
        <h:commandButton value="Sartu" action="#{loginBean.login()}" />
        <br/><br/>
        <h:link value="Ez duzu konturik? Erregistratu hemen" outcome="Register" />
    </h:form>
</h:body>
</html>
