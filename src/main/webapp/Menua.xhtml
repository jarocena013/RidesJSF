<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core">
<h:head>
    <title>Menua</title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>
<h:body>

    <div class="container">
        <h:form id="menuForm">
            <div class="title">Select Option</div>

            <h:commandButton value="CreateRide" action="createRide" styleClass="btn" />
            <h:commandButton value="Query Rides" action="fetchRide" styleClass="btn" />
            <h:commandButton value="Logout" action="#{loginBean.logout()}" styleClass="btn" />
            
        </h:form>
    </div>
</h:body>
</html>
